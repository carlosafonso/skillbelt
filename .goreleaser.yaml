version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: skillbelt
    main: ./cmd/skillbelt
    binary: skillbelt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: elfonsi
    name: skillbelt
