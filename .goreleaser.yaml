version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: skillbelt
    main: ./cmd/skillbelt
    binary: skillbelt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: skillbelt
    repository:
      owner: carlosafonso
      name: homebrew-skillbelt
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/carlosafonso/skillbelt"
    description: "A package manager for agent skills"
    install: |
      bin.install "skillbelt"
    test: |
      system "#{bin}/skillbelt", "--help"

release:
  github:
    owner: carlosafonso
    name: skillbelt
